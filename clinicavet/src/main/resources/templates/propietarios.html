<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propietarios</title>

    <link rel="stylesheet" th:href="@{/css/styleprincipal.css}">
    <link rel="stylesheet" th:href="@{/css/propietarios.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <meta name="csrf-token" th:content="${_csrf.token}"/>
    <meta name="csrf-header" th:content="${_csrf.headerName}"/>
</head>

<body>

<header th:replace="~{layout/fragments :: header}"></header>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main>
    <div class="container-fluid propietarios-container">

        <!-- TÍTULO -->
        <div class="mb-4">
            <h4 class="fw-bold propietarios-title">Gestión de propietarios</h4>
            <p class="propietarios-subtitle">Administración de propietarios y sus mascotas</p>
        </div>

        <!-- ACCIONES HEADER -->
        <div class="acciones-header">
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn-inactivos" id="btnToggleInactivos" onclick="toggleInactivos()">
                    👥 Ver inactivos
                </button>
            </div>
            <button class="btn-registrar" onclick="abrirModalCrear()">
                ➕ Registrar propietario
            </button>
        </div>

        <!-- FILTROS -->
        <div class="filtros-bar">
            <span class="filtro-label">Buscar:</span>
            <div class="input-group filtro-input-wrap">
                <span class="input-group-text">🔍</span>
                <input type="text" class="form-control" id="buscarPropietario"
                       placeholder="Nombre, cédula o correo">
            </div>
        </div>

        <!-- TABLA -->
        <div class="propietarios-table-card">

            <div class="table-top-bar">
                <div class="mostrar-wrap">
                    Mostrar
                    <select class="form-select" id="selectMostrar" onchange="cambiarPorPagina()">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                    registros
                </div>
                <div class="table-info-text" id="textoInfo">Cargando...</div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle propietarios-table">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Cédula</th>
                        <th>Correo</th>
                        <th>Dirección</th>
                        <th class="text-center">Estado</th>
                        <th class="text-center">Opciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaProps">
                    <tr th:each="o : ${owners}"
                        th:data-nombre="${o.name}"
                        th:data-cedula="${o.cedula}"
                        th:data-correo="${o.email != null ? o.email : ''}"
                        th:data-activo="${o.active}">
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <div class="owner-avatar"
                                     th:text="${#strings.toUpperCase(#strings.substring(o.name, 0, 2))}">OW</div>
                                <div>
                                    <div class="owner-name" th:text="${o.name}">Nombre</div>
                                    <div class="owner-cedula-small" th:text="${o.cedula}">Cédula</div>
                                </div>
                            </div>
                        </td>
                        <td th:text="${o.cedula}">123456</td>
                        <td th:text="${o.email != null ? o.email : '-'}">correo@mail.com</td>
                        <td th:text="${o.address != null ? o.address : '-'}">Dirección</td>
                        <td class="text-center">
                            <span th:if="${o.active}" class="badge-estado activo">Activo</span>
                            <span th:unless="${o.active}" class="badge-estado inactivo">Inactivo</span>
                        </td>
                        <td class="text-center">
                            <button class="btn-accion btn-editar" title="Editar"
                                    th:data-id="${o.id}"
                                    th:data-nombre="${o.name}"
                                    th:data-cedula="${o.cedula}"
                                    th:data-correo="${o.email != null ? o.email : ''}"
                                    th:data-direccion="${o.address != null ? o.address : ''}">
                                ✏️
                            </button>
                            <button class="btn-accion danger btn-estado" title="Cambiar estado"
                                    th:data-id="${o.id}"
                                    th:data-activo="${o.active}">
                                <span th:if="${o.active}">🔒</span>
                                <span th:unless="${o.active}">🔓</span>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- PAGINACIÓN -->
            <div class="paginacion-bar">
                <div class="paginacion-info" id="paginacionInfo">-</div>
                <div class="paginacion-btns" id="paginacionBtns"></div>
            </div>

        </div>

    </div>
</main>

<!-- MODAL CREAR / EDITAR PROPIETARIO -->
<div class="modal fade" id="modalPropietario" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-propietario">
            <div class="modal-header modal-propietario-header">
                <div>
                    <h5 class="modal-title" id="modalPropietarioTitulo">Registrar propietario</h5>
                    <p class="modal-subtitle" id="modalPropietarioSubtitulo">Complete los datos del propietario</p>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="propietarioId">

                <div class="row g-3">
                    <!-- Nombre -->
                    <div class="col-12 col-md-6">
                        <label class="propietario-form-label">Nombre completo</label>
                        <input type="text" class="form-control propietario-form-control"
                               id="propietarioNombre" placeholder="Ingrese el nombre completo"
                               maxlength="25">
                    </div>

                    <!-- Cédula -->
                    <div class="col-12 col-md-6">
                        <label class="propietario-form-label">Cédula</label>
                        <input type="text" class="form-control propietario-form-control"
                               id="propietarioCedula" placeholder="Número de cédula"
                               maxlength="20">
                    </div>

                    <!-- Correo -->
                    <div class="col-12 col-md-6">
                        <label class="propietario-form-label">Correo electrónico</label>
                        <input type="email" class="form-control propietario-form-control"
                               id="propietarioCorreo" placeholder="correo@ejemplo.com">
                    </div>

                    <!-- Dirección -->
                    <div class="col-12 col-md-6">
                        <label class="propietario-form-label">Dirección</label>
                        <input type="text" class="form-control propietario-form-control"
                               id="propietarioDireccion" placeholder="Dirección de residencia">
                    </div>
                </div>
            </div>
            <div class="modal-footer px-4 pb-4">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnGuardarPropietario"
                        onclick="guardarPropietario()">
                    <span class="spinner-border spinner-border-sm me-2 d-none" id="spinnerPropietario"></span>
                    Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout/fragments :: footer}"></footer>
<div th:replace="~{layout/fragments :: scripts}"></div>

<script>
    const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="csrf-header"]').getAttribute('content');

    /* ====================================
       PAGINACIÓN Y FILTROS
    ==================================== */
    let paginaActual = 1;
    let porPagina = 10;
    let mostrarInactivos = false;
    let filasTodas = [];

    function inicializar() {
        filasTodas = Array.from(document.querySelectorAll('#tablaProps tr'));
        document.getElementById('buscarPropietario').addEventListener('input', () => {
            paginaActual = 1;
            renderTabla();
        });
        renderTabla();

        // Delegación de eventos para botones
        document.getElementById('tablaProps').addEventListener('click', function(e) {
            const btnEditar = e.target.closest('.btn-editar');
            const btnEstado = e.target.closest('.btn-estado');

            if (btnEditar) {
                const d = btnEditar.dataset;
                abrirModalEditar(d.id, d.nombre, d.cedula, d.correo, d.direccion);
            }
            if (btnEstado) {
                const d = btnEstado.dataset;
                cambiarEstado(d.id, d.activo === 'true');
            }
        });
    }

    function toggleInactivos() {
        mostrarInactivos = !mostrarInactivos;
        const btn = document.getElementById('btnToggleInactivos');
        btn.classList.toggle('activo', mostrarInactivos);
        btn.textContent = mostrarInactivos ? '✅ Ver activos' : '👥 Ver inactivos';
        paginaActual = 1;
        renderTabla();
    }

    function cambiarPorPagina() {
        porPagina = parseInt(document.getElementById('selectMostrar').value);
        paginaActual = 1;
        renderTabla();
    }

    function renderTabla() {
        const textoBuscar = document.getElementById('buscarPropietario').value.toLowerCase();

        const filasFiltradas = filasTodas.filter(fila => {
            const nombre  = (fila.dataset.nombre || '').toLowerCase();
            const cedula  = (fila.dataset.cedula || '').toLowerCase();
            const correo  = (fila.dataset.correo || '').toLowerCase();
            const activo  = fila.dataset.activo === 'true';

            const matchBuscar = nombre.includes(textoBuscar) ||
                cedula.includes(textoBuscar) ||
                correo.includes(textoBuscar);
            const matchEstado = mostrarInactivos ? !activo : activo;

            return matchBuscar && matchEstado;
        });

        const total       = filasFiltradas.length;
        const totalPaginas = Math.max(1, Math.ceil(total / porPagina));
        if (paginaActual > totalPaginas) paginaActual = totalPaginas;

        const inicio = (paginaActual - 1) * porPagina;
        const fin    = Math.min(inicio + porPagina, total);

        filasTodas.forEach(f => f.style.display = 'none');
        filasFiltradas.slice(inicio, fin).forEach(f => f.style.display = '');

        document.getElementById('textoInfo').textContent =
            total === 0 ? 'Sin resultados' : `Mostrando ${inicio + 1} al ${fin} de ${total} registros`;
        document.getElementById('paginacionInfo').textContent =
            total === 0 ? '' : `Mostrando registros del ${inicio + 1} al ${fin} de un total de ${total} registros.`;

        renderPaginacion(totalPaginas);
    }

    function renderPaginacion(totalPaginas) {
        const cont = document.getElementById('paginacionBtns');
        cont.innerHTML = '';

        const btnAnterior = document.createElement('button');
        btnAnterior.className = 'btn-pag';
        btnAnterior.textContent = 'Anterior';
        btnAnterior.disabled = paginaActual === 1;
        btnAnterior.onclick = () => { paginaActual--; renderTabla(); };
        cont.appendChild(btnAnterior);

        for (let i = 1; i <= totalPaginas; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn-pag' + (i === paginaActual ? ' activo' : '');
            btn.textContent = i;
            btn.onclick = (function(p) { return () => { paginaActual = p; renderTabla(); }; })(i);
            cont.appendChild(btn);
        }

        const btnSiguiente = document.createElement('button');
        btnSiguiente.className = 'btn-pag';
        btnSiguiente.textContent = 'Siguiente';
        btnSiguiente.disabled = paginaActual === totalPaginas;
        btnSiguiente.onclick = () => { paginaActual++; renderTabla(); };
        cont.appendChild(btnSiguiente);
    }

    /* ====================================
       MODAL CREAR
    ==================================== */
    function abrirModalCrear() {
        document.getElementById('propietarioId').value = '';
        document.getElementById('propietarioNombre').value = '';
        document.getElementById('propietarioCedula').value = '';
        document.getElementById('propietarioCorreo').value = '';
        document.getElementById('propietarioDireccion').value = '';
        document.getElementById('modalPropietarioTitulo').textContent = 'Registrar propietario';
        document.getElementById('modalPropietarioSubtitulo').textContent = 'Complete los datos del nuevo propietario';
        new bootstrap.Modal(document.getElementById('modalPropietario')).show();
    }

    /* ====================================
       MODAL EDITAR
    ==================================== */
    function abrirModalEditar(id, nombre, cedula, correo, direccion) {
        document.getElementById('propietarioId').value = id;
        document.getElementById('propietarioNombre').value = nombre;
        document.getElementById('propietarioCedula').value = cedula;
        document.getElementById('propietarioCorreo').value = correo;
        document.getElementById('propietarioDireccion').value = direccion;
        document.getElementById('modalPropietarioTitulo').textContent = 'Editar propietario';
        document.getElementById('modalPropietarioSubtitulo').textContent = 'Modifica los datos del propietario';
        new bootstrap.Modal(document.getElementById('modalPropietario')).show();
    }

    /* ====================================
       GUARDAR (CREAR O EDITAR)
    ==================================== */
    function guardarPropietario() {
        const id        = document.getElementById('propietarioId').value;
        const nombre    = document.getElementById('propietarioNombre').value.trim();
        const cedula    = document.getElementById('propietarioCedula').value.trim();
        const correo    = document.getElementById('propietarioCorreo').value.trim();
        const direccion = document.getElementById('propietarioDireccion').value.trim();
        const esNuevo   = !id;

        if (!nombre)  { mostrarAlerta('Ingresa el nombre del propietario', 'warning'); return; }
        if (!cedula)  { mostrarAlerta('Ingresa la cédula', 'warning'); return; }

        const btn     = document.getElementById('btnGuardarPropietario');
        const spinner = document.getElementById('spinnerPropietario');
        btn.disabled  = true;
        spinner.classList.remove('d-none');

        const url    = esNuevo ? '/duenios/crear' : '/duenios/editar';
        const params = { nombre, cedula, correo, direccion };
        if (!esNuevo) params.id = id;

        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                [csrfHeader]: csrfToken
            },
            body: new URLSearchParams(params)
        })
            .then(res => res.json())
            .then(data => {
                spinner.classList.add('d-none');
                btn.disabled = false;
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('modalPropietario')).hide();
                    mostrarAlerta(data.message || 'Propietario guardado exitosamente', 'success');
                    setTimeout(() => location.reload(), 1200);
                } else {
                    mostrarAlerta(data.message || 'Error al guardar el propietario', 'danger');
                }
            })
            .catch(() => {
                spinner.classList.add('d-none');
                btn.disabled = false;
                mostrarAlerta('Error al procesar la solicitud', 'danger');
            });
    }

    /* ====================================
       CAMBIAR ESTADO
    ==================================== */
    function cambiarEstado(id, estadoActual) {
        const accion = estadoActual ? 'desactivar' : 'activar';
        if (!confirm(`¿Estás seguro de que deseas ${accion} este propietario?`)) return;

        fetch(`/duenios/estado/${id}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken
            }
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    mostrarAlerta(data.message || 'Estado actualizado', 'success');
                    setTimeout(() => location.reload(), 1200);
                } else {
                    mostrarAlerta(data.message || 'Error al cambiar el estado', 'danger');
                }
            })
            .catch(() => mostrarAlerta('Error al procesar la solicitud', 'danger'));
    }

    /* ====================================
       ALERTA
    ==================================== */
    function mostrarAlerta(mensaje, tipo = 'info') {
        const alerta = document.createElement('div');
        alerta.className = `alert alert-${tipo} alert-dismissible fade show position-fixed`;
        alerta.style.cssText = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
        alerta.innerHTML = `${mensaje}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
        document.body.appendChild(alerta);
        setTimeout(() => alerta.remove(), 4000);
    }

    /* ====================================
       INIT
    ==================================== */
    document.addEventListener('DOMContentLoaded', inicializar);
</script>

</body>
</html>
