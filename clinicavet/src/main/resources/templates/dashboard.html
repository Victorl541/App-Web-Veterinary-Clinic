<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styleprincipal.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>
<nav th:replace="~{layout/fragments :: navbar}"></nav>

<main>
    <div class="container-fluid dashboard-container">
        <div sec:authorize="hasRole('administrador')">
    <div class="container-fluid">

        <!-- Título -->
        <div class="mb-4">
            <h4 class="fw-bold dashboard-title">Panel de control</h4>
            <p class="dashboard-subtitle">Resumen general del sistema</p>
        </div>

        <!-- Tarjetas estadísticas -->
        <div class="row g-3 mb-4">

            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#eef3ff">🐾</div>
                    <div class="stat-info">
                        <span class="stat-number" th:text="${totalMascotas}">0</span>
                        <span class="stat-label">Mascotas</span>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#fff0f0">👥</div>
                    <div class="stat-info">
                        <span class="stat-number" th:text="${totalDuenios}">0</span>
                        <span class="stat-label">Propietarios</span>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#f0fff4">📅</div>
                    <div class="stat-info">
                        <span class="stat-number" th:text="${citasHoy}">0</span>
                        <span class="stat-label">Citas hoy</span>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#fffbf0">⏳</div>
                    <div class="stat-info">
                        <span class="stat-number" th:text="${citasPendientes}">0</span>
                        <span class="stat-label">Pendientes</span>
                    </div>
                </div>
            </div>
        </div>

        </div>

        <!-- Gráficas -->
        <div class="row g-3">

            <div class="col-12 col-md-8">
                <div class="chart-card">
                    <h6 class="chart-title">Citas por mes</h6>
                    <canvas id="citasChart"></canvas>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="chart-card">
                    <h6 class="chart-title">Mascotas por especie</h6>
                    <canvas id="especiesChart"></canvas>
                </div>
            </div>

        </div>

    </div>
    </div>
</main>

<footer th:replace="~{layout/fragments :: footer}"></footer>
<div th:replace="~{layout/fragments :: scripts}"></div>

<script th:inline="javascript">
    const citasLabels = /*[[${citasPorMes.keySet()}]]*/ [];
    const citasData = /*[[${citasPorMes.values()}]]*/ [];
    const especiesLabels = /*[[${mascotasPorEspecie.keySet()}]]*/ [];
    const especiesData = /*[[${mascotasPorEspecie.values()}]]*/ [];
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    new Chart(document.getElementById('citasChart'), {
        type: 'line',
        data: {
            labels: citasLabels,
            datasets: [{
                label: 'Citas',
                data: citasData,
                borderColor: '#4a6cf7',
                backgroundColor: 'rgba(74,108,247,0.1)',
                borderWidth: 2,
                tension: 0.4,
                fill: true,
                pointBackgroundColor: '#4a6cf7',
                pointRadius: 4
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, grid: { color: '#f0f0f0' } },
                x: { grid: { display: false } }
            }
        }
    });

    new Chart(document.getElementById('especiesChart'), {
        type: 'doughnut',
        data: {
            labels: especiesLabels,
            datasets: [{
                data: especiesData,
                backgroundColor: ['#4a6cf7', '#6a3de8', '#f7934a', '#4ac9f7', '#f74a6a'],
                borderWidth: 0,
                hoverOffset: 8
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { padding: 15, font: { size: 12 } }
                }
            }
        }
    });
</script>

</body>
</html>
