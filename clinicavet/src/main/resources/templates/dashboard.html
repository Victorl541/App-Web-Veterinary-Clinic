<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Veterinaria</title>
    <link rel="stylesheet" th:href="@{/css/styleprincipal.css}">
</head>
<body>

<!-- HEADER SUPERIOR -->
<header class="top-header">
    <div class="header-left">
        <img th:src="@{/img/logo.png}" class="logo" alt="Logo">
        <div class="user-info">
            <span class="clinic-name">Huellitas Sanas</span>
        </div>
    </div>

    <!-- Dropdown usuario -->
    <div class="user-dropdown">
        <div class="user-toggle">
            <div class="user-avatar" th:text="${initials}">ML</div>
            <span>▾</span>
        </div>
        <div class="user-dropdown-content">
            <div class="user-dropdown-header">
                <div class="user-avatar-lg" th:text="${initials}">ML</div>
                <div class="user-dropdown-info">
                    <span class="user-name" th:text="${username}">Nombre</span>
                    <span class="user-role-badge" th:text="${role}">Rol</span>
                </div>
            </div>
            <div class="user-dropdown-divider"></div>
            <a th:href="@{/perfil}">Perfil</a>
            <div class="user-dropdown-divider"></div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="logout-btn">Cerrar sesión</button>
            </form>
        </div>
    </div>

    <button class="hamburger" onclick="toggleMenu()">&#9776;</button>
</header>

<!-- NAVBAR -->
<nav class="main-nav" id="main-nav">
    <div class="nav-right">

        <!-- Solo admin -->
        <div sec:authorize="hasRole('administrador')">
            <a th:href="@{/dashboard}">Dashboard</a>
        </div>

        <!-- Todos los roles -->
        <div sec:authorize="hasAnyRole('administrador', 'medico', 'auxiliar')">
            <a th:href="@{/informes}">Informes médicos</a>
            <a th:href="@{/citas}">Citas</a>
        </div>

        <!-- Dropdown Administración - todos lo ven pero con opciones distintas -->
        <div class="dropdown" sec:authorize="hasAnyRole('administrador', 'medico', 'auxiliar')">
            <span onclick="toggleDropdown(this)">Administración ▾</span>
            <div class="dropdown-content">

                <!-- Solo admin -->
                <a th:href="@{/usuarios}" sec:authorize="hasRole('administrador')">Usuarios</a>
                <a th:href="@{/configuracion}" sec:authorize="hasRole('administrador')">Configuración</a>

                <!-- Todos los roles -->
                <a th:href="@{/duenios}">Propietarios</a>
                <a th:href="@{/mascotas}">Mascotas</a>

            </div>
        </div>

    </div>
</nav>

<!-- CONTENIDO -->
<main>

</main>

<script>
    function toggleMenu() {
        const nav = document.getElementById('main-nav');
        nav.classList.toggle('open');
    }

    function toggleDropdown(el) {
        const content = el.nextElementSibling;
        content.classList.toggle('show');
    }
</script>

</body>
</html>
