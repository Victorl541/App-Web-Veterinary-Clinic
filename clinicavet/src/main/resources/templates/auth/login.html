<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Huellitas Sanas</title>
    <link rel="stylesheet" th:href="@{/css/stylelogin.css}" />
</head>
<body>
<div class="container">
    <!-- Lado izquierdo -->
    <div class="left-panel">
        <div class="overlay">
            <h1>Huellitas Sanas</h1>
            <p>Gestión inteligente para tu veterinaria</p>
        </div>
    </div>
    <!-- Lado derecho -->
    <div class="right-panel">
        <div class="login-card">
            <div class="logo">
                <img th:src="@{/img/logo.png}" alt="Logo" width="80"/>
            </div>
            <h2>Bienvenido</h2>
            <p>Ingresa a tu cuenta</p>

            <!-- Mensaje de error -->
            <div class="alert-error" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="input-group">
                    <input type="text" name="username" placeholder="Correo" required />
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Contraseña" required />
                </div>
                <button type="submit">Ingresar</button>
            </form>

            <div class="extra">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
